<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Setup · JobInboxAgent</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--green:#00ff88;--green-dim:#00ff8833;--text:#e2e8f0;--muted:#64748b;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.card{position:relative;z-index:1;max-width:480px;width:100%}
.step-label{font-family:var(--mono);font-size:11px;color:var(--green);letter-spacing:.1em;margin-bottom:16px}
h1{font-size:36px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
.sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:40px}
.field{margin-bottom:24px}
label{display:block;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.05em;margin-bottom:8px}
input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:13px;padding:12px 16px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--green)}
input::placeholder{color:var(--muted)}
.hint{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6}
.hint a{color:var(--green);text-decoration:none}
.btn{width:100%;font-family:var(--mono);font-size:13px;font-weight:700;padding:14px;background:var(--green);color:#000;border:none;cursor:pointer;letter-spacing:.05em;margin-top:8px;transition:all .2s}
.btn:hover{background:#00ffaa}
</style>
</head>
<body>
<div class="card">
  <div class="step-label">// STEP 2 OF 2</div>
  <h1>Set up Telegram</h1>
  <p class="sub">Logged in as {{ user }} ✓</p>

  <form method="POST">
    <div class="field">
      <label>TELEGRAM BOT TOKEN</label>
      <input type="text" name="telegram_token" placeholder="1234567890:ABCdef..." required/>
      <div class="hint">Get this from <a href="https://t.me/BotFather" target="_blank">@BotFather</a> on Telegram → /newbot</div>
    </div>
    <div class="field">
      <label>YOUR TELEGRAM CHAT ID</label>
      <input type="text" name="chat_id" placeholder="123456789" required/>
      <div class="hint">Message your bot, then visit:<br/>api.telegram.org/bot{TOKEN}/getUpdates → find "id"</div>
    </div>
    <button type="submit" class="btn">Start Monitoring My Inbox →</button>
  </form>
</div>
</body>
</html>
